<!DOCTYPE html>

    <title>Klif's Start Page</title>
    <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      margin: 0 auto;
      padding: 1em;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-wrap: wrap; /* Allows columns to wrap on small screens */
      justify-content: center; /* Center columns horizontally */
      align-items: flex-start;
      min-height: 100vh;
    }
    .links {
      text-align: left;
      line-height: 2em;
      font-size: 2em;
      max-width: 33vw;
      min-width: 250px;
      padding-left: 2em;
      box-sizing: border-box;
      flex: 1 1 300px; /* Flexible for responsiveness */
    }
    a {
      color: #f0f0f0;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
      color: #8ab4f8;
    }
    button {
      background-color: #333;
      color: #f0f0f0;
      border: none;
      padding: 0.5em 1em;
      font-size: 1em;
      cursor: pointer;
      margin-top: 1em;
      display: inline-block;
    }
    button:hover {
      background-color: #444;
    }
    .spacer {
      margin-top: 2em;
    }
    @media (max-width: 800px) {
      .links {
        max-width: 100%;
        padding-left: 0;
      }
    }
  </style>
    <script>
  function openAllLinksLeft() {
    const urls = [
      "https://mail.google.com",
      "https://www.inoreader.com/all_articles",
      "https://app.todoist.com/"
    ];
    for (let i = 0; i < urls.length; i++) {
      const win = window.open(urls[i], '_blank');
      if (!win) {
        alert("Popup blocked. Please allow popups for this site.");
        break;
      }
    }
  }

        break;
      }
    }
  }
</script>
